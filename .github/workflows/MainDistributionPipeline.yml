#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  # Forward-compat canary: intentionally tracks duckdb `main`; expected to go
  # red on upstream API drift and is NOT a merge blocker.
  duckdb-next-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: yaml

  # Shippable build. The submodules are pinned at the v1.5-variegata branch tip
  # (see .gitmodules), but the extension is BUILT against the v1.5.4 release tag
  # so the produced binary is a proper release (loadable by released DuckDB),
  # not a `-dev` build. This is the leg the community-extensions manylinux
  # (linux_amd64 / linux_arm64 docker) binaries are cut from.
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: yaml

  # Code-quality (clang-format) stays on the @main ci-tools target — the repo's
  # original, established config. Both targets install the same clang-format-11,
  # but they differ in scope: @main delegates to duckdb's git-diff-scoped
  # format-check (validates only uncommitted changes), whereas v1.5-variegata
  # runs `format.py --all`, which flags many PRE-EXISTING repo files (e.g.
  # duckdb_compat.hpp and maintainer-written code that predate this PR). Adopting
  # --all would require a repo-wide reformat that is out of scope for this DoS
  # fix; keeping @main preserves the status quo rather than weakening anything.
  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@main
    with:
      duckdb_version: v1.5.4
      ci_tools_version: main
      extension_name: yaml
      format_checks: 'format'

  # Guards against the LINKED_LIBS class of WASM bug (issue #40): the reusable
  # distribution workflow builds and uploads the .wasm but never inspects or
  # loads it, so a side module with unresolved yaml-cpp symbols ships green.
  # Two layers (see test/wasm/):
  #   1. static symbol check (hard gate) — no duckdb-wasm runtime needed.
  #   2. live load+query in duckdb-wasm (informational / continue-on-error) —
  #      expected-red until an official duckdb-wasm ships a matching v1.5.4
  #      build (a version/emscripten skew between the engine and the extension
  #      surfaces as an ABI mismatch on LOAD).
  wasm-load-test:
    name: WASM load test
    needs: [duckdb-stable-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: yaml-v1.5.4-extension-wasm_*
          path: wasm-artifacts
      - name: Static symbol check (yaml-cpp must be linked, not unresolved)
        run: bash test/wasm/run_wasm_checks.sh wasm-artifacts
      - name: Live load test in duckdb-wasm (informational until engine matches)
        continue-on-error: true
        timeout-minutes: 10
        working-directory: test/wasm
        run: |
          set -uo pipefail
          timeout 300 npm install --no-save
          mkdir -p repo/v1.5.4/wasm_eh
          cp "$GITHUB_WORKSPACE/wasm-artifacts/yaml-v1.5.4-extension-wasm_eh/yaml.duckdb_extension.wasm" \
             repo/v1.5.4/wasm_eh/
          timeout 240 node load_test.cjs --repo repo --name yaml --platform eh \
            --query "SELECT yaml_valid('a: 1') AS ok" --expect '"ok":true'
